name: Clang-Format Check on Debian 13

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "!src/Plugins/Macos/**"
      - "!src/Plugins/Windows/**"
      - "tests/**"
      - "moebius/**"
      - "3rdparty/lolly/**"
      - "TeXmacs/progs/**"
      - "TeXmacs/plugins/**"
      - "tools/format/liii/**"
      - ".clang-format"
      - "gfexclude.json"
      - "gfproject.json"
      - ".github/workflows/ci-format-check-debian13.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "!src/Plugins/Macos/**"
      - "!src/Plugins/Windows/**"
      - "tests/**"
      - "moebius/**"
      - "3rdparty/lolly/**"
      - "TeXmacs/progs/**"
      - "TeXmacs/plugins/**"
      - "tools/format/liii/**"
      - ".clang-format"
      - "gfexclude.json"
      - "gfproject.json"
      - ".github/workflows/ci-format-check-debian13.yml"
  workflow_dispatch:

jobs:
  clang-format-check:
    container: debian:13
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
    steps:
      - name: Install dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y clang-format-19 curl ca-certificates

      - uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Download & install goldfish (latest)
        run: |
          TAG=$(curl -fsSLI -o /dev/null -w '%{url_effective}' https://github.com/MoganLab/goldfish/releases/latest | sed 's|.*/tag/||')
          echo "Latest goldfish release: $TAG"
          curl -fsSL -o /tmp/gf.deb "https://github.com/MoganLab/goldfish/releases/download/$TAG/goldfish-scheme-x86_64-$TAG.deb"
          dpkg -i /tmp/gf.deb
          gf version

      - name: Run gf format --check (C++ + Scheme)
        run: gf format --check
